<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>مقارنة — تدفّق الخير</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f4f5;
      color: #000;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    body.dark { background: #050505; color: #fff; }

    /* ---------- Header strip ---------- */
    .cmp-bar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 10px 18px;
      background: #fff;
      border-bottom: 1px solid #eaeaea;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    body.dark .cmp-bar { background: #000; border-color: #1f1f1f; }

    .cmp-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      letter-spacing: -0.01em;
      font-size: 0.92rem;
    }
    .cmp-brand svg { width: 22px; height: 22px; }
    body.dark .cmp-brand svg path { fill: #fff; }

    .cmp-title {
      text-align: center;
      font-weight: 600;
      letter-spacing: -0.01em;
      font-size: 0.84rem;
      color: #666;
      font-family: "Geist Mono", monospace;
    }
    body.dark .cmp-title { color: #a1a1aa; }

    .cmp-controls {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .cmp-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid #eaeaea;
      background: #fff;
      color: #000;
      font: inherit;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 140ms, border-color 140ms;
    }
    .cmp-btn:hover { background: #fafafa; border-color: #d4d4d4; }
    body.dark .cmp-btn { background: #0a0a0a; border-color: #1f1f1f; color: #fff; }
    body.dark .cmp-btn:hover { background: #111; border-color: #333; }

    .cmp-btn.cmp-btn--primary {
      background: #000; color: #fff; border-color: #000;
    }
    .cmp-btn.cmp-btn--primary:hover { opacity: 0.85; }
    body.dark .cmp-btn.cmp-btn--primary { background: #fff; color: #000; border-color: #fff; }

    .cmp-mode {
      display: inline-flex;
      padding: 3px;
      background: #f4f4f5;
      border-radius: 7px;
      border: 1px solid #eaeaea;
    }
    body.dark .cmp-mode { background: #111; border-color: #1f1f1f; }
    .cmp-mode button {
      padding: 5px 12px;
      border-radius: 4px;
      border: 0;
      background: transparent;
      color: #666;
      font: inherit;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
    }
    body.dark .cmp-mode button { color: #a1a1aa; }
    .cmp-mode button.is-on {
      background: #fff;
      color: #000;
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    }
    body.dark .cmp-mode button.is-on { background: #000; color: #fff; }

    /* ---------- Workspace ---------- */
    .cmp-stage {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      padding: 0;
      background: #eaeaea;
      overflow: hidden;
      position: relative;
    }
    body.dark .cmp-stage { background: #1f1f1f; }
    .cmp-stage.stacked { grid-template-columns: 1fr; grid-auto-rows: 1fr; }
    .cmp-stage.singleA, .cmp-stage.singleB { grid-template-columns: 1fr; }

    .cmp-pane {
      position: relative;
      overflow: hidden;
      background: #fff;
      display: flex;
      flex-direction: column;
    }
    body.dark .cmp-pane { background: #000; }
    .cmp-stage.singleA .cmp-pane.B,
    .cmp-stage.singleB .cmp-pane.A { display: none; }

    .cmp-pane__head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      background: linear-gradient(180deg, rgba(244,244,245,0.6), transparent);
      font-size: 0.76rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #666;
      font-family: "Geist Mono", monospace;
      border-bottom: 1px solid #eaeaea;
    }
    body.dark .cmp-pane__head {
      background: linear-gradient(180deg, rgba(17,17,17,0.6), transparent);
      color: #a1a1aa;
      border-bottom-color: #1f1f1f;
    }
    .cmp-pane__dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #f5a623;
    }
    .cmp-pane.A .cmp-pane__dot { background: #c70039; }
    .cmp-pane.B .cmp-pane__dot { background: #000; }
    body.dark .cmp-pane.B .cmp-pane__dot { background: #fff; }
    .cmp-pane__name { font-weight: 700; color: #000; text-transform: none; letter-spacing: -0.005em; font-family: "Geist"; }
    body.dark .cmp-pane__name { color: #fff; }
    .cmp-pane__open {
      margin-inline-start: auto;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: #666;
      text-decoration: none;
      font-family: "Geist";
      font-size: 0.78rem;
      letter-spacing: -0.005em;
      text-transform: none;
      padding: 4px 9px;
      border-radius: 5px;
      transition: background 140ms;
    }
    body.dark .cmp-pane__open { color: #a1a1aa; }
    .cmp-pane__open:hover { background: #f4f4f5; color: #000; }
    body.dark .cmp-pane__open:hover { background: #111; color: #fff; }

    .cmp-pane__frame {
      flex: 1;
      width: 100%;
      border: 0;
      background: #fff;
    }
    body.dark .cmp-pane__frame { background: #000; }

    /* Tag badges */
    .cmp-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      border-radius: 999px;
      background: #f4f4f5;
      border: 1px solid #eaeaea;
      font-size: 0.72rem;
      font-weight: 500;
      color: #666;
      font-family: "Geist Mono", monospace;
    }
    body.dark .cmp-tag { background: #111; border-color: #1f1f1f; color: #a1a1aa; }

    /* Resizable divider for split mode (visual only) */
    .cmp-divider {
      position: absolute;
      inset-block: 0;
      inset-inline-start: 50%;
      transform: translateX(-50%);
      width: 1px;
      background: transparent;
      pointer-events: none;
      z-index: 5;
    }
  </style>
</head>
<body>
  <header class="cmp-bar">
    <div class="cmp-brand">
      <svg viewBox="0 0 76 65" xmlns="http://www.w3.org/2000/svg">
        <path d="M37.5274 0L75.0548 65H0L37.5274 0Z" fill="#000" />
      </svg>
      تدفّق الخير
      <span class="cmp-tag">مقارنة التصاميم</span>
    </div>
    <div class="cmp-title" id="cmpTitle">A: التصميم الإبداعي · B: Final3D المعتمد</div>
    <div class="cmp-controls">
      <a class="cmp-btn" href="portal.html" style="text-decoration:none">البوابة</a>
      <a class="cmp-btn" href="اتجاهات التصميم.html" style="text-decoration:none">اتجاهات</a>
      <div class="cmp-mode" role="tablist" aria-label="محتوى اللوحة الثانية">
        <button data-target="final3d" class="is-on">B: Final3D</button>
        <button data-target="final">C: Final</button>
        <button data-target="vercel">Vercel</button>
        <button data-target="v2">ديوان v2</button>
      </div>
      <div class="cmp-mode" role="tablist" aria-label="نمط العرض">
        <button data-mode="split" class="is-on">جنباً لجنب</button>
        <button data-mode="stacked">فوق وتحت</button>
        <button data-mode="singleA">A فقط</button>
        <button data-mode="singleB">B فقط</button>
      </div>
      <button class="cmp-btn" id="toggleTheme">الوضع الداكن</button>
      <button class="cmp-btn cmp-btn--primary" id="syncBtn" title="مزامنة">⇄ مزامنة</button>
    </div>
  </header>

  <section class="cmp-stage" id="stage">
    <article class="cmp-pane A">
      <header class="cmp-pane__head">
        <span class="cmp-pane__dot"></span>
        <span class="cmp-pane__name">Rasafa Design</span>
        <span class="cmp-tag">A</span>
        <span style="font-family: 'Geist Mono', monospace; font-size: 0.74rem;">تصميم إبداعي · ألوان غنيّة · حركة دافئة</span>
        <a class="cmp-pane__open" href="index.html" target="_blank" rel="noopener">
          افتح في تبويب →
        </a>
      </header>
      <iframe class="cmp-pane__frame" id="frameA" src="index.html" title="Rasafa Design"></iframe>
    </article>

    <article class="cmp-pane B">
      <header class="cmp-pane__head">
        <span class="cmp-pane__dot"></span>
        <span class="cmp-pane__name" id="paneBName">Final 3D — معتمد</span>
        <span class="cmp-tag">B</span>
        <span id="paneBDesc" style="font-family: 'Geist Mono', monospace; font-size: 0.74rem;">النسخة الحالية · زجاج · spring · 3D tilt</span>
        <a class="cmp-pane__open" id="paneBOpen" href="final3d.html" target="_blank" rel="noopener">
          افتح في تبويب →
        </a>
      </header>
      <iframe class="cmp-pane__frame" id="frameB" src="final3d.html" title="Final 3D"></iframe>
    </article>
    <span class="cmp-divider"></span>
  </section>

  <script>
    const stage = document.getElementById('stage');
    const modeBtns = document.querySelectorAll('.cmp-mode [data-mode]');
    modeBtns.forEach(b => b.addEventListener('click', () => {
      modeBtns.forEach(x => x.classList.remove('is-on'));
      b.classList.add('is-on');
      stage.classList.remove('stacked', 'singleA', 'singleB');
      const m = b.dataset.mode;
      if (m === 'stacked') stage.classList.add('stacked');
      if (m === 'singleA') stage.classList.add('singleA');
      if (m === 'singleB') stage.classList.add('singleB');
    }));

    // Pane B target switcher (Vercel / Final)
    const targetInfo = {
      final3d: { src: 'final3d.html', name: 'Final 3D — معتمد', desc: 'النسخة الحالية · زجاج · spring · 3D tilt' },
      final:   { src: 'final.html',  name: 'Final — بدون 3D', desc: 'نفس المنصة بدون تأثير الميل' },
      vercel:  { src: 'vercel.html', name: 'Vercel Style', desc: 'مينيمال · مونوكروم · انضباط طباعي' },
      v2:      { src: 'v2/index.html', name: 'ديوان v2', desc: 'حكومي رسمي · Cairo · زوايا حادة' },
    };
    document.querySelectorAll('[data-target]').forEach(b => b.addEventListener('click', () => {
      document.querySelectorAll('[data-target]').forEach(x => x.classList.remove('is-on'));
      b.classList.add('is-on');
      const t = targetInfo[b.dataset.target];
      document.getElementById('frameB').src = t.src;
      document.getElementById('paneBName').textContent = t.name;
      document.getElementById('paneBDesc').textContent = t.desc;
      document.getElementById('paneBOpen').href = t.src;
    }));

    const themeBtn = document.getElementById('toggleTheme');
    themeBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      themeBtn.textContent = document.body.classList.contains('dark') ? 'الوضع الفاتح' : 'الوضع الداكن';
    });

    // Sync: reload both iframes
    document.getElementById('syncBtn').addEventListener('click', () => {
      document.getElementById('frameA').src = document.getElementById('frameA').src;
      document.getElementById('frameB').src = document.getElementById('frameB').src;
    });
  </script>
</body>
</html>
